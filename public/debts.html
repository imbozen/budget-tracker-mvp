<!DOCTYPE html>
<html>
<head>
<title>Debt Payments</title>

<div id="dashboard" class="dashboard">

<h3>Budget Overview</h3>

<p>Monthly Income: <span id="dIncome">$0</span></p>

<p>Weekly Spending: <span id="dExpenses">$0</span></p>

<p>Fixed Expenses: <span id="dFixed">$0</span></p>

<p>Debt Payments: <span id="dDebt">$0</span></p>

<hr>

<p><strong>Remaining Budget: <span id="dRemaining">$0</span></strong></p>

</div>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
}

nav a{
margin-right:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:400px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:8px;
width:100%;
margin-top:5px;
}

li{
margin:5px 0;
}

</style>
</head>

<body>

<nav>
<a href="/">Weekly Budget</a>
<a href="/fixed.html">Fixed Expenses</a>
<a href="/debts.html">Debts</a>
</nav>

<h1>Debt and Monthly Payments</h1>

<div class="box">

<h3>Add Debt</h3>

<input id="debtName" placeholder="Debt Name (Student Loan)">
<input id="payment" type="number" placeholder="Monthly Payment">

<button onclick="addDebt()">Add Debt</button>

<h3>Debts</h3>

<ul id="debtList"></ul>

<hr>

<h3>Total Monthly Debt Payments</h3>
<p id="debtTotal">$0</p>

<h3>Remaining Budget After Debts</h3>
<p id="finalRemaining">$0</p>

</div>

<script>

let debts = JSON.parse(localStorage.getItem("debts")) || [];

let income = Number(localStorage.getItem("income")) || 0;

let fixedExpenses = JSON.parse(localStorage.getItem("fixedExpenses")) || [];

function save(){
localStorage.setItem("debts", JSON.stringify(debts));
}

function addDebt(){

const name=document.getElementById("debtName").value;
const payment=Number(document.getElementById("payment").value);

if(!name || !payment) return;

debts.push({
name,
payment
});

save();
render();

}

function deleteDebt(index){

debts.splice(index,1);

save();
render();

}

function render(){

const list=document.getElementById("debtList");

list.innerHTML="";

let total=0;

debts.forEach((d,i)=>{

total += d.payment;

const li=document.createElement("li");

li.innerHTML=`${d.name} - $${d.payment}
<button onclick="deleteDebt(${i})">❌</button>`;

list.appendChild(li);

});

document.getElementById("debtTotal").innerText="$"+total;

let fixedTotal=0;

fixedExpenses.forEach(f=>fixedTotal+=f.amount);

const remaining = income - fixedTotal - total;

document.getElementById("finalRemaining").innerText="$"+remaining;

}

render();

</script>

</body>
</html>
